app = "YOUR_APP_NAME"
primary_region = "ams"

[http_service]
  internal_port = 5555
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "2s"
    path = "/healthz"